<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SillyTavern 角色卡编辑器</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>SillyTavern 角色卡编辑器</h1>
      <p>点击任意文本块可放大编辑，右下角按钮可一键复制 Markdown。</p>
    </header>

    <main id="card-grid" class="card-grid" aria-label="角色卡字段预览"></main>

    <button id="export-btn" class="export-btn" type="button">复制 Markdown</button>

    <dialog id="editor-dialog" class="editor-dialog">
      <form method="dialog" class="dialog-shell">
        <header>
          <h2 id="dialog-title">编辑字段</h2>
        </header>
        <label class="dialog-label" for="dialog-textarea">内容</label>
        <textarea id="dialog-textarea" rows="14"></textarea>
        <menu class="dialog-actions">
          <button id="cancel-btn" type="button" value="cancel">取消</button>
          <button id="save-btn" type="button" value="default">保存</button>
        </menu>
      </form>
    </dialog>

    <script src="app.js" defer></script>
  </body>
</html>
